<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorting Visualizer</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #array {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 300px;
      margin: 30px;
    }

    .bar {
      width: 20px;
      margin: 2px;
      background: #38bdf8;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Sorting Visualizer (Bubble Sort)</h1>

<button onclick="generateArray()">Generate Array</button>
<button onclick="bubbleSort()">Start Sorting</button>

<div id="array"></div>

<script>
  let arr = [];

  function generateArray() {
    arr = [];
    let container = document.getElementById("array");
    container.innerHTML = "";

    for (let i = 0; i < 20; i++) {
      let value = Math.floor(Math.random() * 200) + 20;
      arr.push(value);

      let bar = document.createElement("div");
      bar.classList.add("bar");
      bar.style.height = value + "px";

      container.appendChild(bar);
    }
  }

  async function bubbleSort() {
    let bars = document.getElementsByClassName("bar");

    for (let i = 0; i < arr.length; i++) {
      for (let j = 0; j < arr.length - i - 1; j++) {

        bars[j].style.background = "red";
        bars[j+1].style.background = "red";

        await sleep(100);

        if (arr[j] > arr[j + 1]) {
          let temp = arr[j];
          arr[j] = arr[j + 1];
          arr[j + 1] = temp;

          bars[j].style.height = arr[j] + "px";
          bars[j+1].style.height = arr[j+1] + "px";
        }

        bars[j].style.background = "#38bdf8";
        bars[j+1].style.background = "#38bdf8";
      }
    }
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
</script>

</body>
</html>
