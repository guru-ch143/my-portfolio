<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number Guessing Game</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Guess the Number (1-100)</h2>
  <input type="number" id="guess" placeholder="Enter number">
  <br>
  <button onclick="checkGuess()">Guess</button>
  <p id="message"></p>
</div>

<script>
  let randomNumber = Math.floor(Math.random() * 100) + 1;

  function checkGuess() {
    let userGuess = document.getElementById("guess").value;
    let message = document.getElementById("message");

    if (userGuess == randomNumber) {
      message.innerHTML = "🎉 Correct! You guessed it!";
    } else if (userGuess < randomNumber) {
      message.innerHTML = "Too low ⬇️";
    } else {
      message.innerHTML = "Too high ⬆️";
    }
  }
</script>

</body>
</html>
