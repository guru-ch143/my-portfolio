<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <style>
    body {
      font-family: Arial;
      background: #1e1e2f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #2c2c3e;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 8px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      background: #444;
      margin: 5px 0;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      border-radius: 5px;
    }

    .delete {
      color: red;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>To-Do List</h2>
  <input type="text" id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
  function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") return;

    let li = document.createElement("li");
    li.innerHTML = task + " <span class='delete' onclick='removeTask(this)'>X</span>";

    document.getElementById("taskList").appendChild(li);
    input.value = "";
  }

  function removeTask(element) {
    element.parentElement.remove();
  }
</script>

</body>
</html>
